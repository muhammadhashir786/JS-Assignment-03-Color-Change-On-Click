<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Change On Click | JS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>BG Color Changer</h1>
      <p>Click on a button to change background color using Javascript!</p>

      <div class="btns">
        <div class="colors">
          <button class="btn-1" onclick="colorRed()">Red</button>
          <button class="btn-2" onclick="colorBlue()">Blue</button>
          <button class="btn-3" onclick="colorGreen()">Green</button>
          <button class="btn-4" onclick="colorOrange()">Orange</button>
        </div>
        <div class="reset">
          <button class="btn-5" onclick="resetColor()">Reset to Default</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
